<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" width="400" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&amp;family=DM+Sans:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Accent mark: minimal upward arrow / chart line -->
  <polyline
    points="18,62 30,42 42,52 54,28"
