    stroke="#1A3A2A"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Dot at top of line -->
  <circle cx="54" cy="28" r="3.5" fill="#2E7D52"/>

  <!-- Divider -->
  <line x1="74" y1="24" x2="74" y2="88" stroke="#D0D5D0" stroke-width="1"/>

  <!-- Name -->
  <text
